[project]
name = "guilde-ia"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11, <3.14" 

dependencies = [
    "accelerate>=1.13.0",
    "matplotlib>=3.10.8",
    "mlx>=0.30.0 ; sys_platform == 'darwin'",
    "mlx[cuda]>=0.30.0 ; sys_platform == 'linux'",
    "mlx-lm>=0.30.0",
    "pandas>=3.0.1",
    "scikit-learn>=1.8.0",
    "transformers>=5.3.0",
]

[tool.uv]
environments = [
    "sys_platform == 'darwin' and platform_machine == 'arm64'",
    "sys_platform == 'linux' and platform_machine == 'x86_64'"
]